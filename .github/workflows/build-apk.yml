name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodni yuklab olish
      uses: actions/checkout@v4

    - name: Node.js sozlash
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Java JDK sozlash
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11' # Cordova uchun eng barqaror versiya

    - name: Android SDK asboblarini sozlash
      uses: android-actions/setup-android@v3

    - name: Cordova-ni o'rnatish
      run: npm install -g cordova

    - name: Ilovani yaratish va sozlash
      run: |
        cordova create justin com.justin.ai "Justin AI"
        cd justin
        cordova platform add android
        
    - name: HTML faylni ilova ichiga joylash
        rm -rf justin/www/*
        cp index.html justin/www/

    - name: Ovoz (Mikrofon) ruxsatnomalarini qo'shish
      run: |
        sed -i '/<\/widget>/i \    <config-file target="AndroidManifest.xml" parent="/*">\n        <uses-permission android:name="android.permission.RECORD_AUDIO" />\n        <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n    </config-file>' justin/config.xml

    - name: APK-ni yig'ish (Build)
      run: |
        cd justin
        cordova build android --debug

    - name: Tayyor APK-ni yuklash uchun saqlash
      uses: actions/upload-artifact@v4
      with:
        name: Justin-AI-APK
        path: justin/platforms/android/app/build/outputs/apk/debug/app-debug.apk
