name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodni yuklab olish
      uses: actions/checkout@v4

    - name: Node.js sozlash
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Java JDK sozlash
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Capacitor o'rnatish va loyihani tayyorlash
      run: |
        mkdir -p www
        cp index.html www/
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "Justin AI" "com.justin.ai" --web-dir=www
        npx cap add android

    - name: Android ruxsatnomalarini qo'shish (Mikrofon uchun)
      run: |
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />' android/app/src/main/AndroidManifest.xml

    - name: Capacitor loyihasini sinxronizatsiya qilish
      run: |
        npx cap sync android

    - name: Gradle fayllariga ruxsat berish va APK yig'ish
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: APK-ni yuklash uchun tayyorlash
      uses: actions/upload-artifact@v4
      with:
        name: Justin-AI-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
